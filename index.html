<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Редактор аэронавигационных данных · Беларусь ICAO</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    :root {
      --bg-primary: #0b1a2f;
      --bg-secondary: #12243a;
      --bg-tertiary: #1a314a;
      --text-primary: #e0e8f0;
      --text-muted: #9aafc4;
      --accent: #00b4d8;
      --accent-glow: #48cae4;
      --danger: #e63946;
      --warning: #f4a261;
      --success: #2a9d8f;
      --border: #2a3f5a;
      --shadow: 0 8px 32px rgba(0,0,0,0.4);
      --radius: 12px;
      --transition: 0.2s ease;
      --font: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
    }
    .sidebar {
      width: 460px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
      z-index: 1000;
      transition: width var(--transition);
      position: relative;
    }
    .sidebar-header {
      padding: 18px 20px;
      background: linear-gradient(135deg, #0b1a2f 0%, #132e4a 100%);
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h2 {
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-header h2 i { color: var(--accent); font-size: 1.5rem; }
    .toolbar {
      display: flex;
      gap: 6px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      align-items: center;
    }
    .btn {
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all var(--transition);
      white-space: nowrap;
    }
    .btn i { font-size: 0.9rem; }
    .btn:hover { background: #1e3a5c; border-color: var(--accent); color: #fff; }
    .btn.accent { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    .btn.accent:hover { background: var(--accent-glow); }
    .btn.success { background: var(--success); border-color: var(--success); color: #fff; }
    .btn.danger { background: var(--danger); border-color: var(--danger); color: #fff; }
    .btn.active-btn { background: var(--accent); border-color: var(--accent); color: #000; }
    .search-box { margin: 10px 16px; position: relative; }
    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 38px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 0.9rem;
    }
    .search-box i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }
    .tabs-nav {
      display: flex;
      background: var(--bg-tertiary);
      border-bottom: 1px solid var(--border);
      padding: 0 10px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 6px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all var(--transition);
      border-bottom: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .tab-btn i { font-size: 0.85rem; }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      background: rgba(0,180,216,0.08);
    }
    .tab-btn:hover { color: #fff; }
    .tab-content { flex: 1; overflow-y: auto; padding: 8px 12px; display: none; }
    .tab-content.active { display: flex; flex-direction: column; }
    .table-wrapper { flex: 1; overflow-y: auto; border-radius: 8px; border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      font-weight: 500;
      padding: 10px 8px;
      text-align: left;
      position: sticky;
      top: 0;
      z-index: 2;
      border-bottom: 2px solid var(--border);
    }
    td { padding: 8px; border-bottom: 1px solid rgba(42,63,90,0.5); cursor: pointer; }
    tr:hover td { background: rgba(0,180,216,0.08); }
    .count-badge {
      background: var(--accent);
      color: #000;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 0.7rem;
      font-weight: 600;
      margin-left: 6px;
    }
    .editor-panel {
      background: var(--bg-tertiary);
      border-top: 1px solid var(--border);
      padding: 14px 16px;
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }
    .editor-panel.visible { display: block; }
    .editor-panel h4 { margin-bottom: 10px; color: var(--accent); }
    textarea {
      width: 100%;
      height: 140px;
      background: var(--bg-primary);
      color: #cbd5e1;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 0.8rem;
      resize: vertical;
    }
    .edit-actions { display: flex; gap: 8px; margin-top: 10px; }
    .map-container { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; background: #1a2b3c; }
    .map-legend {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      z-index: 1000;
      font-size: 0.8rem;
      box-shadow: var(--shadow);
      color: var(--text-muted);
    }
    .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
    .legend-color { width: 14px; height: 14px; border-radius: 3px; }
    .coord-display {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.8rem;
      z-index: 1000;
      box-shadow: var(--shadow);
      color: var(--accent);
      font-family: monospace;
    }
    .leaflet-container { background: #1a2b3c; font-family: var(--font); }
    .leaflet-control-zoom a { background: var(--bg-secondary); color: var(--text-primary); border-color: var(--border); }
    .leaflet-control-attribution { display: none !important; }
    .leaflet-popup-content-wrapper { background: var(--bg-secondary); color: var(--text-primary); border-radius: 10px; box-shadow: var(--shadow); }
    .leaflet-popup-tip { background: var(--bg-secondary); }
    .leaflet-marker-icon { filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5)); }
    .route-shadow { filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.6)); }
    @media (max-width: 900px) {
      .sidebar {
        width: 100%;
        position: absolute;
        z-index: 2000;
        height: 50%;
        bottom: 0;
        border-radius: 20px 20px 0 0;
      }
      .map-container { height: 100%; }
    }
    .loading-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: white;
      font-size: 1.5rem;
    }
    .spinner {
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid var(--accent);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-right: 12px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2><i class="fas fa-globe-europe"></i> ICAO Беларусь · Редактор</h2>
    </div>
    <div class="toolbar">
      <button class="btn" onclick="document.getElementById('fileInput').click()"><i class="fas fa-folder-open"></i> Загрузить</button>
      <input type="file" id="fileInput" accept=".json,.geojson" style="display:none" onchange="loadFile(event)">
      <button class="btn success" onclick="saveFile()"><i class="fas fa-save"></i> JSON</button>
      <button class="btn accent" onclick="exportGeoJSON()"><i class="fas fa-file-export"></i> GeoJSON</button>
      <button class="btn" id="onlineIcaoBtn" onclick="toggleOnlineLayer()"><i class="fas fa-cloud"></i> Онлайн ICAO</button>
      <button class="btn" id="layerSwitchBtn" onclick="switchBaseLayer()"><i class="fas fa-layer-group"></i> Слой</button>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Поиск по названию, ICAO, точке..." oninput="applySearch()">
    </div>
    <div class="tabs-nav">
      <button class="tab-btn active" data-tab="0"><i class="fas fa-plane-departure"></i> Аэродромы <span class="count-badge" id="badge0">0</span></button>
      <button class="tab-btn" data-tab="1"><i class="fas fa-map-marker-alt"></i> Точки <span class="count-badge" id="badge1">0</span></button>
      <button class="tab-btn" data-tab="2"><i class="fas fa-route"></i> Маршруты <span class="count-badge" id="badge2">0</span></button>
    </div>
    <div class="tab-content active" id="tab0">
      <div class="table-wrapper"><table id="airportsTable"><thead><tr><th>ICAO</th><th>Название</th><th>Координаты</th></tr></thead><tbody></tbody></table></div>
    </div>
    <div class="tab-content" id="tab1">
      <div class="table-wrapper"><table id="pointsTable"><thead><tr><th>Код</th><th>Название</th><th>Тип</th><th>Координаты</th></tr></thead><tbody></tbody></table></div>
    </div>
    <div class="tab-content" id="tab2">
      <div class="table-wrapper"><table id="routesTable"><thead><tr><th>ID</th><th>Точки</th><th>Тип</th><th>Эшелон</th></tr></thead><tbody></tbody></table></div>
    </div>
    <div class="editor-panel" id="editorPanel">
      <h4><i class="fas fa-pen"></i> Редактор объекта</h4>
      <div id="editorMeta"></div>
      <textarea id="jsonEditor" spellcheck="false"></textarea>
      <div class="edit-actions">
        <button class="btn accent" onclick="saveEdit()"><i class="fas fa-check"></i> Сохранить</button>
        <button class="btn" onclick="closeEditor()">Отмена</button>
        <button class="btn danger" onclick="deleteItem()"><i class="fas fa-trash"></i> Удалить</button>
      </div>
    </div>
  </div>

  <div class="map-container">
    <div id="map"></div>
    <div class="coord-display" id="coordDisplay">N 53°54.00' E 027°34.00'</div>
    <div class="map-legend">
      <div class="legend-item"><div class="legend-color" style="background:#f4a261;"></div> Навигационные точки (прочие)</div>
      <div class="legend-item"><div class="legend-color" style="background:#27ae60;"></div> Воздушные трассы</div>
      <div class="legend-item"><div class="legend-color" style="background:#2980b9;"></div> Трассы МВЛ</div>
      <div class="legend-item"><div class="legend-color" style="background:#ed7307;"></div> Маршруты P</div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script>
    (function() {
      if (typeof L === 'undefined') {
        alert('Не удалось загрузить библиотеку Leaflet. Проверьте подключение к интернету.');
        return;
      }

      let currentData = { airports: {}, points: {}, routes: {} };
      let map, airportLayer, routeLayer, markerClusterGroup;
      let currentEdit = null;
      let autoLoadAttempted = false;

      let onlineData = null;
      let onlineLayerEnabled = false;
      let onlineAirportLayer, onlineRouteLayer, onlineMarkerClusterGroup;

      const baseLayers = [
        { name: 'Тёмный (CartoDB)', url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', options: { subdomains: 'abcd', maxZoom: 19 } },
        { name: 'Стандартный (OSM)', url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', options: { maxZoom: 19 } },
        { name: 'Спутник (Esri)', url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', options: { maxZoom: 18 } }
      ];
      let currentBaseLayerIndex = 0;
      let currentBaseLayer = null;

      const airport1IcaoSet = new Set([
        "UMMS","UMLI","XMLI","UMMM","XMMI","UMMB","UMMA","XMMA","UMMO","XMMO",
        "XMNV","UMNV","XMNN","UMBB","XMMR","UMMR","XMNG","UMMG","XMMU","UMDD",
        "XMDD","XMMP","XMMM","XMME","XMMW","UMIP","XMML","XMNW","UMII","XMNO",
        "UMOO","XMGD","UMGG","XMNB","XMGB","UMGM","UMMZ","UMNL","UMBP"
      ]);

      const airportIcon1 = L.icon({ iconUrl: 'images/map/airport-1.svg', iconSize: [32,32], iconAnchor: [16,16], popupAnchor: [0,-16] });
      const airportIcon2 = L.icon({ iconUrl: 'images/map/airport-2.svg', iconSize: [32,32], iconAnchor: [16,16], popupAnchor: [0,-16] });

      const routePNames = new Set([
        "02113","02114","02115","02116","02117","02122","02123","02124","02125","02126",
        "02128","02130","12132","02133","02134","02135","02136","02137","02138","02139",
        "02141","02142","02143","02144","02145","02146","02148","93111"
      ]);

      function formatCoord(val, digits = 4) {
        const num = parseFloat(val);
        return isNaN(num) ? '-' : num.toFixed(digits);
      }
      function toNum(val) {
        const n = parseFloat(val);
        return isNaN(n) ? 0 : n;
      }
      function safeStr(val, fallback = '') {
        if (val === null || val === undefined) return fallback;
        return String(val);
      }

      function getAirportIcon(airport) {
        const icao = safeStr(airport.icao || airport.id || '').toUpperCase();
        if (airport1IcaoSet.has(icao)) return airportIcon1;
        const dataType = safeStr(airport.dataType, '').toLowerCase().trim();
        if (dataType === 'airport') return airportIcon1;
        if (dataType === 'aerodrome') return airportIcon2;
        const typeVal = parseInt(airport.type);
        if (typeVal === 1) return airportIcon1;
        return airportIcon2;
      }

      // Форматирование маршрута для попапа точки
      function formatRoutePoints(route) {
        if (!route || !route.points || route.points.length === 0) return '';
        const points = route.points;
        let groups = [];
        let currentGroup = [points[0]];
        let currentAlt = points[0].altitude || '-';
        for (let i = 1; i < points.length; i++) {
          const alt = points[i].altitude || '-';
          if (alt === currentAlt) {
            currentGroup.push(points[i]);
          } else {
            groups.push({ names: currentGroup.map(p => `"${p.name}"`).join(' - '), alt: currentAlt });
            currentGroup = [points[i]];
            currentAlt = alt;
          }
        }
        groups.push({ names: currentGroup.map(p => `"${p.name}"`).join(' - '), alt: currentAlt });
        return groups.map(g => `${g.names} // высота ${g.alt} //`).join(' - ');
      }

      // Генерация контента попапа для точки
      function generatePointPopup(point, allRoutes) {
        const name = point.name || point.code || 'Точка';
        const translit = point.translit || '';
        const lat = toNum(point.lat);
        const lng = toNum(point.lng);
        let html = `<b>${name}</b>`;
        if (translit) html += ` - ${translit}`;
        html += `<br>Координаты: ${lat.toFixed(6)}, ${lng.toFixed(6)}`;

        if (point.routes && Array.isArray(point.routes) && point.routes.length > 0) {
          html += '<br><b>Маршруты:</b><br><ol style="margin:4px 0 0 16px; padding:0;">';
          point.routes.forEach((r, idx) => {
            const route = allRoutes[r.id];
            const routeName = r.name || '?';
            if (route) {
              const formatted = formatRoutePoints(route);
              html += `<li>${routeName}: ${formatted}</li>`;
            } else {
              html += `<li>${routeName} (данные не найдены)</li>`;
            }
          });
          html += '</ol>';
        }
        return html;
      }

      function initMap() {
        if (map) return;
        map = L.map('map', {
          center: [53.9, 27.6],
          zoom: 8,
          zoomControl: true,
          preferCanvas: true
        });

        setBaseLayer(currentBaseLayerIndex);

        airportLayer = L.layerGroup();
        routeLayer = L.layerGroup();
        markerClusterGroup = L.markerClusterGroup({
          chunkedLoading: true,
          maxClusterRadius: 50,
          iconCreateFunction: function(cluster) {
            return L.divIcon({
              html: `<div style="background:rgba(0,180,216,0.9);color:#000;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;">${cluster.getChildCount()}</div>`,
              className: ''
            });
          }
        });

        onlineAirportLayer = L.layerGroup();
        onlineRouteLayer = L.layerGroup();
        onlineMarkerClusterGroup = L.markerClusterGroup({
          chunkedLoading: true,
          maxClusterRadius: 50,
          iconCreateFunction: function(cluster) {
            return L.divIcon({
              html: `<div style="background:rgba(0,180,216,0.9);color:#000;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:12px;">${cluster.getChildCount()}</div>`,
              className: ''
            });
          }
        });

        map.addLayer(airportLayer);
        map.addLayer(markerClusterGroup);
        map.addLayer(routeLayer);

        map.on('mousemove', function(e) {
          const lat = e.latlng.lat;
          const lng = e.latlng.lng;
          document.getElementById('coordDisplay').innerHTML =
            `N ${Math.abs(lat).toFixed(4)}° ${lat>=0?'N':'S'}  E ${Math.abs(lng).toFixed(4)}° ${lng>=0?'E':'W'}`;
        });

        map.on('click', function() {
          if (currentEdit) closeEditor();
        });
      }

      function setBaseLayer(index) {
        if (!map) return;
        if (currentBaseLayer) map.removeLayer(currentBaseLayer);
        const layer = baseLayers[index];
        currentBaseLayer = L.tileLayer(layer.url, layer.options);
        currentBaseLayer.addTo(map);
        document.getElementById('layerSwitchBtn').innerHTML = `<i class="fas fa-layer-group"></i> ${layer.name}`;
      }

      window.switchBaseLayer = function() {
        currentBaseLayerIndex = (currentBaseLayerIndex + 1) % baseLayers.length;
        setBaseLayer(currentBaseLayerIndex);
      };

      async function autoLoadData() {
        if (autoLoadAttempted) return;
        autoLoadAttempted = true;
        showLoading(true);
        try {
          const response = await fetch('./icao_belarus_data.json');
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const text = await response.text();
          const parsed = JSON.parse(text);
          currentData = {
            airports: parsed.airports || {},
            points: parsed.points || {},
            routes: parsed.routes || {}
          };
          initMap();
          refreshAll();
          plotAllOnMap();
        } catch (err) {
          console.warn('Автозагрузка icao_belarus_data.json не удалась:', err.message);
          initMap();
          refreshAll();
          plotAllOnMap();
          setTimeout(() => {
            if (Object.keys(currentData.airports).length === 0 &&
                Object.keys(currentData.points).length === 0 &&
                Object.keys(currentData.routes).length === 0) {
              const note = document.createElement('div');
              note.style.position = 'fixed';
              note.style.bottom = '20px';
              note.style.left = '50%';
              note.style.transform = 'translateX(-50%)';
              note.style.background = 'var(--bg-secondary)';
              note.style.border = '1px solid var(--accent)';
              note.style.padding = '10px 20px';
              note.style.borderRadius = '8px';
              note.style.zIndex = '9999';
              note.style.color = 'var(--text-primary)';
              note.innerHTML = '<i class="fas fa-info-circle"></i> Файл <b>icao_belarus_data.json</b> не найден или недоступен. Возможно, необходим локальный сервер (например, <code>npx http-server</code>). <br>Загрузите данные вручную кнопкой «Загрузить».';
              document.body.appendChild(note);
              setTimeout(() => note.remove(), 8000);
            }
          }, 500);
        } finally {
          showLoading(false);
        }
      }

      function showLoading(show) {
        let overlay = document.getElementById('loadingOverlay');
        if (show) {
          if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'loadingOverlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = '<div class="spinner"></div> Загрузка данных...';
            document.body.appendChild(overlay);
          }
        } else {
          if (overlay) overlay.remove();
        }
      }

      window.loadFile = async function(event) {
        const file = event.target.files[0];
        if (!file) return;
        showLoading(true);
        try {
          const text = await file.text();
          const parsed = JSON.parse(text);
          currentData = {
            airports: parsed.airports || {},
            points: parsed.points || {},
            routes: parsed.routes || {}
          };
          initMap();
          refreshAll();
          plotAllOnMap();
        } catch (e) {
          alert('Ошибка чтения файла: ' + e.message);
        } finally {
          showLoading(false);
          event.target.value = '';
        }
      };

      function renderAllTables() {
        renderAirportsTable();
        renderPointsTable();
        renderRoutesTable();
        updateBadges();
      }

      function renderAirportsTable(filter = '') {
        const tbody = document.querySelector('#airportsTable tbody');
        tbody.innerHTML = '';
        Object.entries(currentData.airports).forEach(([id, a]) => {
          const displayName = (a.name && a.name !== 'null') ? a.name : (a.description || id);
          if (filter && !displayName.toLowerCase().includes(filter) && !id.toLowerCase().includes(filter)) return;
          const row = tbody.insertRow();
          row.innerHTML = `<td><strong>${id}</strong></td><td>${displayName}</td><td>${formatCoord(a.lat)}, ${formatCoord(a.lng)}</td>`;
          row.addEventListener('click', () => editItem('airport', id));
        });
      }

      function renderPointsTable(filter = '') {
        const tbody = document.querySelector('#pointsTable tbody');
        tbody.innerHTML = '';
        Object.entries(currentData.points).forEach(([id, p]) => {
          const name = safeStr(p.name, '');
          if (filter && !id.toLowerCase().includes(filter) && !name.toLowerCase().includes(filter)) return;
          const row = tbody.insertRow();
          row.innerHTML = `<td><strong>${id}</strong></td><td>${name}</td><td>${safeStr(p.dataType || p.type, 'waypoint')}</td><td>${formatCoord(p.lat)}, ${formatCoord(p.lng)}</td>`;
          row.addEventListener('click', () => editItem('point', id));
        });
      }

      function renderRoutesTable(filter = '') {
        const tbody = document.querySelector('#routesTable tbody');
        tbody.innerHTML = '';
        Object.entries(currentData.routes).forEach(([id, r]) => {
          const pts = r.points || r.waypoints || [];
          if (filter && !id.toLowerCase().includes(filter)) return;
          const row = tbody.insertRow();
          row.innerHTML = `<td>${id}</td><td>${pts.length} точек</td><td>${safeStr(r.dataType, '-')}</td><td>${r.level || '-'}</td>`;
          row.addEventListener('click', () => editItem('route', id));
        });
      }

      function updateBadges() {
        document.getElementById('badge0').textContent = Object.keys(currentData.airports).length;
        document.getElementById('badge1').textContent = Object.keys(currentData.points).length;
        document.getElementById('badge2').textContent = Object.keys(currentData.routes).length;
      }

      window.applySearch = function() {
        const query = document.getElementById('searchInput').value.trim().toLowerCase();
        renderAirportsTable(query);
        renderPointsTable(query);
        renderRoutesTable(query);
      };

      window.editItem = function(type, id) {
        let item = null;
        if (type === 'airport') item = currentData.airports[id];
        else if (type === 'point') item = currentData.points[id];
        else if (type === 'route') item = currentData.routes[id];
        if (!item) return;

        currentEdit = { type, id };
        document.getElementById('editorPanel').classList.add('visible');
        document.getElementById('editorMeta').innerHTML = `<span style="color:var(--accent);">${type.toUpperCase()}:</span> ${id}`;
        document.getElementById('jsonEditor').value = JSON.stringify(item, null, 2);

        const lat = toNum(item.lat);
        const lng = toNum(item.lng);
        if (!isNaN(lat) && !isNaN(lng)) {
          map.setView([lat, lng], 12);
        } else if (item.points && item.points.length > 0) {
          const p = item.points[0];
          map.setView([toNum(p.lat), toNum(p.lng)], 10);
        } else if (item.waypoints && item.waypoints.length > 0) {
          const wp = item.waypoints[0];
          map.setView([toNum(wp.lat), toNum(wp.lng)], 10);
        }
      };

      window.saveEdit = function() {
        if (!currentEdit) return;
        try {
          const updated = JSON.parse(document.getElementById('jsonEditor').value);
          const { type, id } = currentEdit;
          if (type === 'airport') currentData.airports[id] = updated;
          else if (type === 'point') currentData.points[id] = updated;
          else if (type === 'route') currentData.routes[id] = updated;
          closeEditor();
          refreshAll();
          plotAllOnMap();
        } catch (e) {
          alert('Ошибка JSON: ' + e.message);
        }
      };

      window.deleteItem = function() {
        if (!currentEdit) return;
        if (!confirm(`Удалить ${currentEdit.type} "${currentEdit.id}"?`)) return;
        const { type, id } = currentEdit;
        if (type === 'airport') delete currentData.airports[id];
        else if (type === 'point') delete currentData.points[id];
        else if (type === 'route') delete currentData.routes[id];
        closeEditor();
        refreshAll();
        plotAllOnMap();
      };

      window.closeEditor = function() {
        currentEdit = null;
        document.getElementById('editorPanel').classList.remove('visible');
      };

      function refreshAll() {
        renderAllTables();
        updateBadges();
      }

      function plotAllOnMap() {
        if (!map) initMap();
        airportLayer.clearLayers();
        routeLayer.clearLayers();
        markerClusterGroup.clearLayers();

        Object.values(currentData.airports).forEach(a => {
          const lat = toNum(a.lat), lng = toNum(a.lng);
          if (isNaN(lat)||isNaN(lng)) return;
          const displayName = (a.name && a.name !== 'null') ? a.name : (a.description || a.icao || 'Аэродром');
          L.marker([lat,lng], { icon: getAirportIcon(a) })
            .bindPopup(`<b>${a.icao||displayName}</b><br>${displayName}<br>${lat.toFixed(6)}, ${lng.toFixed(6)}`)
            .addTo(airportLayer);
        });

        const pointIconMap = {
          'pointAW': { file:'point-vt.svg', small:false },
          'pointMVL': { file:'point-mvl.svg', small:false },
          'pointVHF': { file:'point-vhf.svg', small:false },
          'pointAD': { file:'point-ad.svg', small:false },
          'pointP': { file:'point-p.svg', small:true }
        };
        const reducedSizeIcons = ['point-vt.svg','point-mvl.svg','point-vhf.svg','point-ad.svg'];

        Object.values(currentData.points).forEach(p => {
          const lat = toNum(p.lat), lng = toNum(p.lng);
          if (isNaN(lat)||isNaN(lng)) return;
          const dataType = safeStr(p.dataType||p.type,'').trim();
          const mapping = pointIconMap[dataType] || { file:'point-p.svg', small:true };
          const iconFile = mapping.file;
          let iconSize;
          if (reducedSizeIcons.includes(iconFile)) iconSize = [16,16];
          else if (mapping.small) iconSize = [13,13];
          else iconSize = [32,32];
          const pointIcon = L.icon({ iconUrl:'images/map/'+iconFile, iconSize, iconAnchor:[iconSize[0]/2,iconSize[1]/2], popupAnchor:[0,-iconSize[1]/2] });
          L.marker([lat,lng], {icon:pointIcon})
            .bindPopup(generatePointPopup(p, currentData.routes))
            .addTo(markerClusterGroup);
        });

        const routeStyleMap = {
          'routeAW': { color:'#27ae60', weight:2.3, dashArray:'1 4 8 4' },
          'routeMVL': { color:'#2980b9', weight:1.5, dashArray:'1 4 10 4' },
          'trackMVL': { color:'#2980b9', weight:2.3, dashArray:'1 4 10 4' },
          'routeP': { color:'#ed7307', weight:2, dashArray:'1 4 8 4' }
        };

        Object.values(currentData.routes).forEach(r => {
          const pts = r.points||r.waypoints||[];
          if (pts.length<2) return;
          const coords = pts.map(p=>[toNum(p.lat),toNum(p.lng)]);
          const routeDataType = safeStr(r.dataType,'').trim();
          const routeName = safeStr(r.name, '').trim();
          const useRouteP = (routeDataType === 'routeP') || routePNames.has(routeName);
          const effectiveType = useRouteP ? 'routeP' : routeDataType;
          const style = routeStyleMap[effectiveType] || { color:'#9b59b6', weight:2, dashArray:'6 8' };

          L.polyline(coords, {
            color: style.color,
            weight: style.weight,
            dashArray: style.dashArray,
            opacity: 0.9,
            lineCap: 'round',
            className: 'route-shadow'
          })
          .bindPopup(`<b>Маршрут ${r.name||''}</b><br>Точек: ${pts.length}<br>Тип: ${effectiveType||'неизвестен'}`)
          .addTo(routeLayer);
        });
      }

      async function loadOnlineData() {
        showLoading(true);
        try {
          const resp = await fetch('https://fpl3.ban.by/api/aero/all');
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const json = await resp.json();
          onlineData = {
            airports: json.airports || {},
            points: json.points || {},
            routes: json.routes || {}
          };
          plotOnlineData();
        } catch(e) {
          alert('Ошибка загрузки онлайн-данных ICAO: ' + e.message + '\nВозможно, запрос заблокирован политикой CORS или отсутствует сетевое соединение.');
          onlineData = null;
          document.getElementById('onlineIcaoBtn').classList.remove('active-btn');
        } finally {
          showLoading(false);
        }
      }

      function plotOnlineData() {
        if (!onlineData) return;
        if (!map) initMap();
        onlineAirportLayer.clearLayers();
        onlineRouteLayer.clearLayers();
        onlineMarkerClusterGroup.clearLayers();

        Object.values(onlineData.airports).forEach(a => {
          const lat = toNum(a.lat), lng = toNum(a.lng);
          if (isNaN(lat)||isNaN(lng)) return;
          const displayName = (a.name && a.name !== 'null') ? a.name : (a.description || a.icao || 'Аэродром');
          L.marker([lat,lng], { icon: getAirportIcon(a) })
            .bindPopup(`<b>${a.icao||displayName}</b><br>${displayName}<br>${lat.toFixed(6)}, ${lng.toFixed(6)}`)
            .addTo(onlineAirportLayer);
        });

        const pointIconMap = {
          'pointAW': { file:'point-vt.svg', small:false },
          'pointMVL': { file:'point-mvl.svg', small:false },
          'pointVHF': { file:'point-vhf.svg', small:false },
          'pointAD': { file:'point-ad.svg', small:false },
          'pointP': { file:'point-p.svg', small:true }
        };
        const reducedSizeIcons = ['point-vt.svg','point-mvl.svg','point-vhf.svg','point-ad.svg'];

        Object.values(onlineData.points).forEach(p => {
          const lat = toNum(p.lat), lng = toNum(p.lng);
          if (isNaN(lat)||isNaN(lng)) return;
          const dataType = safeStr(p.dataType||p.type,'').trim();
          const mapping = pointIconMap[dataType] || { file:'point-p.svg', small:true };
          const iconFile = mapping.file;
          let iconSize;
          if (reducedSizeIcons.includes(iconFile)) iconSize = [16,16];
          else if (mapping.small) iconSize = [13,13];
          else iconSize = [32,32];
          const pointIcon = L.icon({ iconUrl:'images/map/'+iconFile, iconSize, iconAnchor:[iconSize[0]/2,iconSize[1]/2], popupAnchor:[0,-iconSize[1]/2] });
          L.marker([lat,lng], {icon:pointIcon})
            .bindPopup(generatePointPopup(p, onlineData.routes))
            .addTo(onlineMarkerClusterGroup);
        });

        const routeStyleMap = {
          'routeAW': { color:'#27ae60', weight:2.3, dashArray:'1 4 8 4' },
          'routeMVL': { color:'#2980b9', weight:1.5, dashArray:'1 4 10 4' },
          'trackMVL': { color:'#2980b9', weight:2.3, dashArray:'1 4 10 4' },
          'routeP': { color:'#ed7307', weight:2, dashArray:'1 4 8 4' }
        };

        Object.values(onlineData.routes).forEach(r => {
          const pts = r.points||r.waypoints||[];
          if (pts.length<2) return;
          const coords = pts.map(p=>[toNum(p.lat),toNum(p.lng)]);
          const routeDataType = safeStr(r.dataType,'').trim();
          const routeName = safeStr(r.name, '').trim();
          const useRouteP = (routeDataType === 'routeP') || routePNames.has(routeName);
          const effectiveType = useRouteP ? 'routeP' : routeDataType;
          const style = routeStyleMap[effectiveType] || { color:'#9b59b6', weight:2, dashArray:'6 8' };

          L.polyline(coords, {
            color: style.color,
            weight: style.weight,
            dashArray: style.dashArray,
            opacity: 0.9,
            lineCap: 'round',
            className: 'route-shadow'
          })
          .bindPopup(`<b>Маршрут ${r.name||''}</b><br>Точек: ${pts.length}<br>Тип: ${effectiveType||'неизвестен'}`)
          .addTo(onlineRouteLayer);
        });
      }

      window.toggleOnlineLayer = function() {
        const btn = document.getElementById('onlineIcaoBtn');
        if (onlineLayerEnabled) {
          map.removeLayer(onlineAirportLayer);
          map.removeLayer(onlineRouteLayer);
          map.removeLayer(onlineMarkerClusterGroup);
          btn.classList.remove('active-btn');
          onlineLayerEnabled = false;
        } else {
          if (!onlineData) {
            loadOnlineData().then(() => {
              if (onlineData) {
                map.addLayer(onlineAirportLayer);
                map.addLayer(onlineRouteLayer);
                map.addLayer(onlineMarkerClusterGroup);
                btn.classList.add('active-btn');
                onlineLayerEnabled = true;
              }
            });
          } else {
            map.addLayer(onlineAirportLayer);
            map.addLayer(onlineRouteLayer);
            map.addLayer(onlineMarkerClusterGroup);
            btn.classList.add('active-btn');
            onlineLayerEnabled = true;
          }
        }
      };

      window.saveFile = function() {
        const blob = new Blob([JSON.stringify(currentData, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'icao_belarus_data.json';
        a.click();
      };

      window.exportGeoJSON = function() {
        const features = [];
        Object.entries(currentData.airports).forEach(([id, a]) => {
          if (a.lat !== undefined && a.lng !== undefined) features.push({
            type: 'Feature', geometry: { type: 'Point', coordinates: [toNum(a.lng), toNum(a.lat)] },
            properties: { type: 'airport', icao: id, name: a.name, elev: a.elev }
          });
        });
        Object.entries(currentData.points).forEach(([id, p]) => {
          if (p.lat !== undefined && p.lng !== undefined) features.push({
            type: 'Feature', geometry: { type: 'Point', coordinates: [toNum(p.lng), toNum(p.lat)] },
            properties: { type: 'navaid', id, name: p.name, dataType: p.dataType || p.type }
          });
        });
        Object.entries(currentData.routes).forEach(([id, r]) => {
          const pts = r.points || r.waypoints || [];
          if (pts.length >= 2) features.push({
            type: 'Feature', geometry: { type: 'LineString', coordinates: pts.map(p => [toNum(p.lng), toNum(p.lat)]) },
            properties: { type: 'route', id, name: r.name, level: r.level, dataType: r.dataType }
          });
        });
        const geoJSON = { type: 'FeatureCollection', features };
        const blob = new Blob([JSON.stringify(geoJSON, null, 2)], { type: 'application/geo+json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'icao_belarus_export.geojson';
        a.click();
      };

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
          this.classList.add('active');
          const tabId = this.getAttribute('data-tab');
          document.getElementById('tab' + tabId).classList.add('active');
        });
      });

      document.addEventListener('keydown', function(e) {
        if (e.ctrlKey && e.key === 's') {
          e.preventDefault();
          saveFile();
        }
      });

      initMap();
      refreshAll();
      autoLoadData();
    })();
  </script>
</body>
</html>
